<svg width="200" height="60" viewBox="0 0 200 60" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- AI part with gradient -->
  <defs>
    <linearGradient id="aiGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" style="stop-color:#3b82f6;stop-opacity:1" />
      <stop offset="100%" style="stop-color:#8b5cf6;stop-opacity:1" />
    </linearGradient>
  </defs>
  
  <!-- AI text -->
  <text x="10" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="url(#aiGradient)">AI</text>
  
  <!-- Dot separator -->
  <circle cx="62" cy="30" r="4" fill="#8b5cf6"/>
  
  <!-- Hub text -->
  <text x="72" y="40" font-family="system-ui, -apple-system, sans-serif" font-size="36" font-weight="700" fill="#1f2937">Hub</text>
  
  <!-- Neural network icon (small) -->
  <g transform="translate(170, 20)">
    <circle cx="0" cy="0" r="3" fill="#3b82f6" opacity="0.8"/>
    <circle cx="15" cy="-8" r="3" fill="#8b5cf6" opacity="0.8"/>
    <circle cx="15" cy="8" r="3" fill="#3b82f6" opacity="0.8"/>
    <line x1="3" y1="0" x2="12" y2="-8" stroke="#8b5cf6" stroke-width="1.5" opacity="0.5"/>
    <line x1="3" y1="0" x2="12" y2="8" stroke="#3b82f6" stroke-width="1.5" opacity="0.5"/>
  </g>
</svg>
